suite: external-secrets tests
templates:
  - external-secrets.yaml
tests:
  - it: should not render when no jobs are defined
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when job is disabled
    set:
      jobs:
        my-job:
          enabled: false
          externalSecret:
            enabled: true
            dataFrom:
              regexp: ".*"
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when externalSecret is disabled
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when externalSecret is not configured
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret when enabled with regexp
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              regexp: "/app/production/.*"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret

  - it: should set correct ExternalSecret name from job fullname
    release:
      name: test-release
    set:
      jobs:
        deploy-lambda:
          enabled: true
          command: ["npm"]
          args: ["deploy"]
          externalSecret:
            enabled: true
            dataFrom:
              regexp: ".*"
    asserts:
      - equal:
          path: metadata.name
          value: test-release-k8s-job-deploy-lambda
      - equal:
          path: spec.target.name
          value: test-release-k8s-job-deploy-lambda

  - it: should allow custom ExternalSecret name
    release:
      name: test-release
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            name: custom-secret-name
            dataFrom:
              regexp: ".*"
    asserts:
      - equal:
          path: metadata.name
          value: custom-secret-name
      - equal:
          path: spec.target.name
          value: custom-secret-name

  - it: should use default secretStoreRef
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              regexp: ".*"
    asserts:
      - equal:
          path: spec.secretStoreRef.name
          value: aws-parameter-store-cluster
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore

  - it: should allow custom secretStoreRef
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            secretStoreRef:
              name: custom-secret-store
              kind: SecretStore
            dataFrom:
              regexp: ".*"
    asserts:
      - equal:
          path: spec.secretStoreRef.name
          value: custom-secret-store
      - equal:
          path: spec.secretStoreRef.kind
          value: SecretStore

  - it: should set default policies
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              regexp: ".*"
    asserts:
      - equal:
          path: spec.target.creationPolicy
          value: Owner
      - equal:
          path: spec.target.deletionPolicy
          value: Retain
      - equal:
          path: spec.refreshInterval
          value: "0"
      - equal:
          path: spec.refreshPolicy
          value: OnChange

  - it: should allow custom policies
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            refreshInterval: "1h"
            refreshPolicy: Always
            creationPolicy: Merge
            deletionPolicy: Delete
            dataFrom:
              regexp: ".*"
    asserts:
      - equal:
          path: spec.refreshInterval
          value: "1h"
      - equal:
          path: spec.refreshPolicy
          value: Always
      - equal:
          path: spec.target.creationPolicy
          value: Merge
      - equal:
          path: spec.target.deletionPolicy
          value: Delete

  - it: should set dataFrom with regexp only
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              regexp: "/app/production/lambda/.*"
    asserts:
      - equal:
          path: spec.dataFrom[0].find.name.regexp
          value: "/app/production/lambda/.*"
      - isNull:
          path: spec.dataFrom[0].find.path

  - it: should set dataFrom with path and regexp
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              path: /app/production/lambda/
              regexp: ".*"
    asserts:
      - equal:
          path: spec.dataFrom[0].find.path
          value: /app/production/lambda/
      - equal:
          path: spec.dataFrom[0].find.name.regexp
          value: ".*"

  - it: should set dataFrom with rewrite
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              path: /app/production/lambda/
              regexp: ".*"
              rewrite:
                source: "/app/production/lambda/(.*)"
                target: "$1"
    asserts:
      - equal:
          path: spec.dataFrom[0].rewrite[0].regexp.source
          value: "/app/production/lambda/(.*)"
      - equal:
          path: spec.dataFrom[0].rewrite[0].regexp.target
          value: "$1"

  - it: should not include rewrite when not configured
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              regexp: ".*"
    asserts:
      - isNull:
          path: spec.dataFrom[0].rewrite

  - it: should set ArgoCD sync-wave annotation
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              regexp: ".*"
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-1"

  - it: should have correct labels
    release:
      name: test-release
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              regexp: ".*"
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: k8s-job
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: my-job

  - it: should set dataFrom array with multiple entries
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              - path: /lambda/my-lambda/
                regexp: ".*"
                rewrite:
                  source: "/lambda/my-lambda/(.*)"
                  target: "$1"
              - path: /shared/
                regexp: "S3_CLOUD_.*"
                rewrite:
                  source: "/shared/(.*)"
                  target: "$1"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.dataFrom[0].find.path
          value: /lambda/my-lambda/
      - equal:
          path: spec.dataFrom[0].find.name.regexp
          value: ".*"
      - equal:
          path: spec.dataFrom[0].rewrite[0].regexp.source
          value: "/lambda/my-lambda/(.*)"
      - equal:
          path: spec.dataFrom[0].rewrite[0].regexp.target
          value: "$1"
      - equal:
          path: spec.dataFrom[1].find.path
          value: /shared/
      - equal:
          path: spec.dataFrom[1].find.name.regexp
          value: "S3_CLOUD_.*"
      - equal:
          path: spec.dataFrom[1].rewrite[0].regexp.source
          value: "/shared/(.*)"
      - equal:
          path: spec.dataFrom[1].rewrite[0].regexp.target
          value: "$1"

  - it: should set dataFrom array with regexp only (no path)
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              - regexp: "/app/production/.*"
              - regexp: "/app/staging/.*"
    asserts:
      - equal:
          path: spec.dataFrom[0].find.name.regexp
          value: "/app/production/.*"
      - isNull:
          path: spec.dataFrom[0].find.path
      - isNull:
          path: spec.dataFrom[0].rewrite
      - equal:
          path: spec.dataFrom[1].find.name.regexp
          value: "/app/staging/.*"
      - isNull:
          path: spec.dataFrom[1].find.path
      - isNull:
          path: spec.dataFrom[1].rewrite

  - it: should set dataFrom array with mixed entries (some with rewrite, some without)
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              - path: /lambda/my-lambda/
                regexp: ".*"
                rewrite:
                  source: "/lambda/my-lambda/(.*)"
                  target: "$1"
              - regexp: "/shared/S3_CLOUD_.*"
    asserts:
      - equal:
          path: spec.dataFrom[0].find.path
          value: /lambda/my-lambda/
      - equal:
          path: spec.dataFrom[0].find.name.regexp
          value: ".*"
      - equal:
          path: spec.dataFrom[0].rewrite[0].regexp.source
          value: "/lambda/my-lambda/(.*)"
      - isNull:
          path: spec.dataFrom[1].find.path
      - equal:
          path: spec.dataFrom[1].find.name.regexp
          value: "/shared/S3_CLOUD_.*"
      - isNull:
          path: spec.dataFrom[1].rewrite

  - it: should set dataFrom array with single entry
    set:
      jobs:
        my-job:
          enabled: true
          command: ["echo"]
          args: ["hello"]
          externalSecret:
            enabled: true
            dataFrom:
              - path: /app/production/lambda/
                regexp: ".*"
    asserts:
      - equal:
          path: spec.dataFrom[0].find.path
          value: /app/production/lambda/
      - equal:
          path: spec.dataFrom[0].find.name.regexp
          value: ".*"
      - isNull:
          path: spec.dataFrom[0].rewrite

  - it: should render multiple ExternalSecrets for multiple jobs
    set:
      jobs:
        job-one:
          enabled: true
          command: ["echo"]
          args: ["one"]
          externalSecret:
            enabled: true
            dataFrom:
              regexp: "/path/one/.*"
        job-two:
          enabled: true
          command: ["echo"]
          args: ["two"]
          externalSecret:
            enabled: true
            dataFrom:
              regexp: "/path/two/.*"
    asserts:
      - hasDocuments:
          count: 2
