---
nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

# Default values applied to all jobs (can be overridden per job)
jobDefaults:
  image:
    repository: node
    tag: "20-alpine"
    pullPolicy: IfNotPresent

  # Job spec defaults
  ttlSecondsAfterFinished: 600
  backoffLimit: 1
  completions: 1
  parallelism: 1

  # ArgoCD hook configuration
  argocd:
    hook: PreSync
    syncWave: "1"
    hookDeletePolicy: BeforeHookCreation

  # Container defaults
  command: []
  args: []
  workingDir: ""

  # Environment configuration
  env: []
  envFrom: []

  # Resource defaults
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Security contexts
  podSecurityContext: {}
  securityContext: {}

  # Scheduling
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Volumes
  volumes: []
  volumeMounts: []

  # RBAC defaults
  serviceAccount:
    create: true
    annotations: {}
  rbac:
    create: false
    clusterScope: false
    rules: []

  # External Secrets defaults
  externalSecret:
    enabled: false
    # name: ""  # defaults to job fullname
    refreshInterval: "0"
    refreshPolicy: OnChange
    secretStoreRef:
      name: aws-parameter-store-cluster
      kind: ClusterSecretStore
    creationPolicy: Owner
    deletionPolicy: Retain
    # dataFrom can be a single object (legacy) or an array of objects (for multiple paths)
    # Single path example:
    dataFrom:
      path: ""
      regexp: ""
      rewrite: {}
        # source: ""
        # target: ""
    # Multiple paths example:
    # dataFrom:
    #   - path: /lambda/my-lambda/
    #     regexp: ".*"
    #     rewrite:
    #       source: "/lambda/my-lambda/(.*)"
    #       target: "$1"
    #   - path: /shared/
    #     regexp: "S3_CLOUD_.*"
    #     rewrite:
    #       source: "/shared/(.*)"
    #       target: "$1"

# List of jobs to create
# Each job inherits from jobDefaults and can override any value
jobs: {}
  # Example job configuration:
  # deploy-lambda:
  #   enabled: true
  #   image:
  #     repository: node
  #     tag: "20-alpine"
  #   command: ["npm"]
  #   args: ["run", "deploy"]
  #   workingDir: /app
  #   env:
  #     - name: AWS_REGION
  #       value: us-east-1
  #   envFrom:
  #     - secretRef:
  #         name: aws-credentials
  #   resources:
  #     limits:
  #       cpu: "1"
  #       memory: 512Mi
  #   serviceAccount:
  #     create: true
  #     annotations:
  #       eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/lambda-deploy
  #   rbac:
  #     create: false
